<div id="sim-container" style="max-width:650px;margin:20px auto;padding:30px;border-radius:20px;background-color:#ffffff;box-shadow:0 15px 40px rgba(0,0,0,0.15);font-family:'Pretendard',sans-serif;color:#333;">
<h2 style="text-align:center;color:#FF6600;margin-bottom:25px;font-weight:800;">🏙️ 재개발 수익성 정밀 분석</h2>
<div style="background:#fff9f5;padding:20px;border-radius:15px;margin-bottom:25px;border:1px solid #ffe0cc;">
<div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:15px;">
<div><label style="font-weight:700;font-size:14px;">🏠 주택 유형</label><select id="houseType" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;margin-top:5px;"><option value="collective">공동주택 (빌라)</option><option value="single">단독 / 다가구</option></select></div>
<div><label style="font-weight:700;font-size:14px;">💰 현재 공시가격 (원)</label><input type="number" id="publicPrice" value="271000000" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;margin-top:5px;box-sizing:border-box;"><a href="https://www.realtyprice.kr" target="_blank" style="display:block;margin-top:10px;padding:10px;background:#FF6600;color:#ffffff;text-align:center;text-decoration:none;border-radius:8px;font-size:14px;font-weight:bold;box-shadow:0 2px 5px rgba(255,102,0,0.2);">공시지가확인 🔍</a></div>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:15px;">
<div><label style="font-weight:700;font-size:14px;color:#d35400;">🎯 예상 조합원 분양가</label><input type="number" id="memberPrice" placeholder="예: 900000000" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;margin-top:5px;"></div>
<div><label style="font-weight:700;font-size:14px;color:#27ae60;">📈 입주 시 예상 시세</label><input type="number" id="futurePrice" placeholder="예: 1500000000" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;margin-top:5px;"></div>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
<div><label style="font-size:11px;font-weight:bold;">🏦 대출(%)</label><input type="number" id="loanRatio" value="50" style="width:100%;padding:8px;border:1px solid #eee;"></div>
<div><label style="font-size:11px;font-weight:bold;">📈 금리(%)</label><input type="number" id="loanRate" value="4.5" step="0.1" style="width:100%;padding:8px;border:1px solid #eee;"></div>
<div><label style="font-size:11px;font-weight:bold;">📅 기간(월)</label><input type="number" id="duration" value="48" style="width:100%;padding:8px;border:1px solid #eee;"></div>
</div>
</div>
<button onclick="calculateRedevPro()" style="width:100%;padding:20px;background:#2c3e50;color:white;border:none;border-radius:12px;font-size:18px;font-weight:bold;cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,0.2);">실행력 있는 분석 시작</button>
<div id="resultArea" style="display:none;margin-top:30px;"><div style="background:#f8f9fa;padding:20px;border-radius:15px;border-top:5px solid #FF6600;"><h4 style="margin:0 0 15px 0;color:#FF6600;">📋 상세 자금 명세</h4><div style="display:flex;justify-content:space-between;margin:8px 0;"><span>예상 권리가액</span><span id="resAppraisal"></span></div><div style="display:flex;justify-content:space-between;margin:8px 0;"><span>추가 분담금</span><span id="resContribution" style="color:#e74c3c;font-weight:bold;"></span></div><div style="display:flex;justify-content:space-between;margin:8px 0;"><span>이주비 대출 이자</span><span id="resInterest"></span></div><div style="display:flex;justify-content:space-between;margin:8px 0;border-bottom:1px solid #ddd;padding-bottom:10px;"><span>예상 취득세</span><span id="resTax"></span></div><div style="margin-top:15px;display:flex;justify-content:space-between;align-items:center;"><span style="font-weight:bold;">총 투자 원가</span><span id="resTotalCost" style="font-size:20px;font-weight:800;color:#2c3e50;"></span></div><div style="margin-top:20px;padding:15px;background:#27ae60;color:white;border-radius:10px;text-align:center;"><p style="margin:0;font-size:14px;">예상 시세차익 (수익)</p><h2 id="resProfit" style="margin:5px 0 0 0;color:#ffffff;"></h2></div></div></div>
</div>
<script>
function calculateRedevPro(){const type=document.getElementById('houseType').value;const pubPrice=parseFloat(document.getElementById('publicPrice').value);const memPrice=parseFloat(document.getElementById('memberPrice').value);const futPrice=parseFloat(document.getElementById('futurePrice').value);const loanRatio=parseFloat(document.getElementById('loanRatio').value)/100;const loanRate=parseFloat(document.getElementById('loanRate').value)/100;const months=parseFloat(document.getElementById('duration').value);if(isNaN(memPrice)){alert("예상 분양가를 입력하십시오.");return;}const correction=(type==='collective')?1.4:1.7;const appraisal=pubPrice*correction;const contribution=memPrice-appraisal;const interest=(appraisal*loanRatio)*loanRate*(months/12);const tax=contribution>0?contribution*0.0296:0;const totalCost=appraisal+contribution+interest+tax;const profit=isNaN(futPrice)?0:futPrice-totalCost;document.getElementById('resultArea').style.display='block';document.getElementById('resAppraisal').innerText=Math.floor(appraisal).toLocaleString()+" 원";document.getElementById('resContribution').innerText=Math.floor(contribution).toLocaleString()+" 원";document.getElementById('resInterest').innerText=Math.floor(interest).toLocaleString()+" 원";document.getElementById('resTax').innerText=Math.floor(tax).toLocaleString()+" 원";document.getElementById('resTotalCost').innerText=Math.floor(totalCost).toLocaleString()+" 원";if(!isNaN(futPrice)){document.getElementById('resProfit').innerText="약 "+Math.floor(profit).toLocaleString()+" 원";}else{document.getElementById('resProfit').innerText="미래 시세를 입력해 주세요";}}
</script>
